name: Monthly Stats Collection

on:
  schedule:
    - cron: '0 6 1 * *'   # 6:00 AM UTC on the 1st of every month
  workflow_dispatch:        # Allow manual trigger from the Actions UI
    inputs:
      period:
        description: 'Month to collect (YYYY-MM). Defaults to previous calendar month.'
        required: false
        default: ''

permissions:
  contents: write           # Required to commit data files back to the repo
  pages: write              # Required to trigger a GitHub Pages build
  id-token: write           # Required by the Pages deployment API

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate GitHub token
        env:
          GH_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: METRICS_GITHUB_TOKEN secret is not set or is empty" >&2
            exit 1
          fi
          echo "GH_TOKEN is set (length: ${#GH_TOKEN})"
          HTTP_CODE=$(curl -s -o /tmp/gh_rate.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/rate_limit)
          echo "GitHub API response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: GitHub API returned $HTTP_CODE — token may be invalid or expired" >&2
            cat /tmp/gh_rate.json >&2
            exit 1
          fi
          REMAINING=$(python3 -c "import json; d=json.load(open('/tmp/gh_rate.json')); print(d['rate']['remaining'])")
          LIMIT=$(python3 -c "import json; d=json.load(open('/tmp/gh_rate.json')); print(d['rate']['limit'])")
          echo "✓ Token valid — rate limit: $REMAINING/$LIMIT remaining"

      - name: Collect stats
        env:
          GH_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            python scripts/collect_stats.py --period "${{ github.event.inputs.period }}"
          else
            python scripts/collect_stats.py
          fi

      - name: Commit data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats/
          git diff --cached --quiet || git commit -m "chore: add stats for $(date +'%Y-%m')"
          git push

      - name: Trigger GitHub Pages build and wait for completion
        run: |
          # Trigger the build
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds

          # Poll until status is 'built' or 'errored' (max 10 minutes)
          echo "Waiting for Pages build to complete..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/pages/builds/latest \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "  Pages build status: ${STATUS} (check ${i}/60)"
            if [ "$STATUS" = "built" ]; then
              echo "✓ Pages build complete"
              break
            elif [ "$STATUS" = "errored" ]; then
              echo "✗ Pages build errored" >&2
              exit 1
            fi
          done
          if [ "$STATUS" != "built" ]; then
            echo "✗ Pages build timed out after 10 minutes" >&2
            exit 1
          fi

      - name: Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PERIOD=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚨 Fueled OSS Metrics collection failed for ${PERIOD}\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"🚨 OSS Metrics Collection Failed\" }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"The monthly stats collection workflow failed for *${PERIOD}*. No data was committed for this month.\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run logs>\"
                  }
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PERIOD=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)
          STATS_FILE="data/stats/${PERIOD}.json"

          # Extract all stats with month-over-month deltas
          python3 -c "
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          def load(path):
              p = Path(path)
              if not p.exists():
                  return None
              return json.loads(p.read_text())

          def agg(repos, key, src='gh'):
              if src == 'gh':
                  return sum(r['github_stats'].get(key) or 0 for r in repos)
              if src == 'wp':
                  return sum((r.get('wordpress_stats') or {}).get(key) or 0
                             for r in repos if r.get('wordpress_stats'))
              if src == 'npm':
                  return sum((r.get('npm_stats') or {}).get(key) or 0
                             for r in repos if r.get('npm_stats'))

          def prev_period(period):
              y, m = int(period[:4]), int(period[5:7])
              if m == 1:
                  return f'{y-1}-12'
              return f'{y}-{m-1:02d}'

          curr = load('${STATS_FILE}')
          repos = curr['repos']

          prev_file = 'data/stats/' + prev_period('${PERIOD}') + '.json'
          prev = load(prev_file)
          prev_repos = prev['repos'] if prev else []

          def f(n): return f'{n:,}'

          def delta(now, before):
              if before is None:
                  return ''
              d = now - before
              if d == 0:
                  return ' _(±0)_'
              return f' _(+{f(d)})_' if d > 0 else f' _({f(d)})_'

          def rating_avg(rlist):
              rated = [r.get('rating') for r in rlist if r.get('rating') is not None]
              return round(sum(rated) / len(rated) / 20, 1) if rated else None

          # Current values
          stars     = agg(repos, 'stars')
          watchers  = agg(repos, 'watchers')
          forks     = agg(repos, 'forks')
          used_by   = agg(repos, 'used_by_total')
          releases  = agg(repos, 'releases_this_month')
          wp_inst   = agg(repos, 'active_installs', 'wp')
          wp_dl     = agg(repos, 'total_downloads', 'wp')
          wp_rating = rating_avg([r['wordpress_stats'] for r in repos if r.get('wordpress_stats')])
          npm_dl    = agg(repos, 'monthly_downloads', 'npm')
          npm_dep   = agg(repos, 'dependents', 'npm')

          # Previous values
          p_stars    = agg(prev_repos, 'stars')    if prev_repos else None
          p_watchers = agg(prev_repos, 'watchers') if prev_repos else None
          p_forks    = agg(prev_repos, 'forks')    if prev_repos else None
          p_used_by  = agg(prev_repos, 'used_by_total') if prev_repos else None
          p_releases = agg(prev_repos, 'releases_this_month') if prev_repos else None
          p_wp_inst  = agg(prev_repos, 'active_installs', 'wp') if prev_repos else None
          p_wp_dl    = agg(prev_repos, 'total_downloads', 'wp') if prev_repos else None
          p_wp_r     = rating_avg([r['wordpress_stats'] for r in prev_repos if r.get('wordpress_stats')]) if prev_repos else None
          p_npm_dl   = agg(prev_repos, 'monthly_downloads', 'npm') if prev_repos else None
          p_npm_dep  = agg(prev_repos, 'dependents', 'npm') if prev_repos else None

          wp_r_str = (f'{wp_rating} / 5' + (delta(wp_rating, p_wp_r) if p_wp_r else '')) if wp_rating else None

          gh_fields = [
            f'*Repos Tracked*\n{len(repos)}',
            f'*Total Stars*\n{f(stars)}{delta(stars, p_stars)}',
            f'*Watchers*\n{f(watchers)}{delta(watchers, p_watchers)}',
            f'*Forks*\n{f(forks)}{delta(forks, p_forks)}',
            f'*Used By*\n{f(used_by)}{delta(used_by, p_used_by)}',
            f'*Releases This Month*\n{f(releases)}{delta(releases, p_releases)}',
          ]
          wp_fields = [
            f'*WP Active Installs*\n{f(wp_inst)}{delta(wp_inst, p_wp_inst)}',
            f'*WP Total Downloads*\n{f(wp_dl)}{delta(wp_dl, p_wp_dl)}',
          ] + ([f'*WP Avg Rating*\n{wp_r_str}'] if wp_r_str else [])
          npm_r = [r['npm_stats'] for r in repos if r.get('npm_stats')]
          npm_fields = ([
            f'*npm Downloads*\n{f(npm_dl)}{delta(npm_dl, p_npm_dl)}',
            f'*npm Dependents*\n{f(npm_dep)}{delta(npm_dep, p_npm_dep)}',
          ] if npm_r else [])

          def fields_block(fields):
            items = ','.join('{\"type\":\"mrkdwn\",\"text\":\"' + s.replace('\"','\\\\\"') + '\"}' for s in fields)
            return '{\"type\":\"section\",\"fields\":[' + items + ']}'

          # Split into groups of 10 (Slack max per section)
          def chunks(lst, n):
            for i in range(0, len(lst), n): yield lst[i:i+n]

          all_fields = gh_fields + wp_fields + npm_fields
          section_blocks = ','.join(fields_block(c) for c in chunks(all_fields, 10))

          divider = '{\"type\":\"divider\"}'
          button  = '{\"type\":\"actions\",\"elements\":[{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"View Dashboard\"},\"url\":\"https://fueled.github.io/oss-metrics/\",\"style\":\"primary\"}]}'
          header  = '{\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"📊 Fueled OSS Metrics — ${PERIOD}\"}}'

          payload = '{\"text\":\"📊 Fueled OSS Metrics updated for ${PERIOD}\",\"blocks\":[' + ','.join([header, section_blocks, divider, button]) + ']}'
          print(payload)
          " | curl -s -X POST -H "Content-Type: application/json" -d @- "$SLACK_WEBHOOK_URL"
