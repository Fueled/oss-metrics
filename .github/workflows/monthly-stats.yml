name: Monthly Stats Collection

on:
  schedule:
    - cron: '0 6 1 * *'   # 6:00 AM UTC on the 1st of every month
  workflow_dispatch:        # Allow manual trigger from the Actions UI

permissions:
  contents: write           # Required to commit data files back to the repo
  pages: write              # Required to trigger a GitHub Pages build
  id-token: write           # Required by the Pages deployment API

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect stats
        env:
          GH_TOKEN: ${{ secrets.BOT_PUBLIC_GITHUB_TOKEN }}
        run: python scripts/collect_stats.py

      - name: Commit data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats/
          git diff --cached --quiet || git commit -m "chore: add stats for $(date +'%Y-%m')"
          git push

      - name: Trigger GitHub Pages build
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds

      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PERIOD=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📊 *Fueled OSS Metrics updated for ${PERIOD}*\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"📊 *Fueled OSS Metrics — ${PERIOD} data is now live*\nView the dashboard: https://fueled.github.io/oss-metrics/\"
                  }
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"
