name: Monthly Stats Collection

on:
  schedule:
    - cron: '0 6 1 * *'   # 6:00 AM UTC on the 1st of every month
  workflow_dispatch:        # Allow manual trigger from the Actions UI

permissions:
  contents: write           # Required to commit data files back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect stats
        env:
          GH_TOKEN: ${{ secrets.BOT_PUBLIC_GITHUB_TOKEN }}
        run: python scripts/collect_stats.py

      - name: Commit data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats/
          git diff --cached --quiet || git commit -m "chore: add stats for $(date +'%Y-%m')"
          git push
