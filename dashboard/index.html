<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fueled OSS Metrics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #ffa657;
      --yellow: #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    #last-updated { color: var(--muted); font-size: 13px; }

    /* ── Summary cards ── */
    .summary-bar {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      flex-wrap: wrap;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      flex: 1;
      min-width: 160px;
    }
    .card-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .card-value { font-size: 28px; font-weight: 700; margin-top: 4px; }

    /* ── Tabs ── */
    .tabs-wrapper {
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 10px 16px;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Repo panels ── */
    .repo-panel { display: none; padding: 24px; }
    .repo-panel.active { display: block; }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .panel-grid { grid-template-columns: 1fr; } }

    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart-box.full-width { grid-column: 1 / -1; }
    .chart-box h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }

    canvas { max-height: 280px; }

    /* ── Data table ── */
    .table-wrapper {
      grid-column: 1 / -1;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
      padding: 8px 12px;
      text-align: right;
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,.02); }
    tbody td {
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      text-align: right;
      white-space: nowrap;
    }
    tbody td:first-child { text-align: left; font-weight: 600; }
    .delta-pos { color: var(--green); }
    .delta-neg { color: var(--red); }
    .delta-zero { color: var(--muted); }
    .null-val { color: var(--muted); }

    /* ── Loading / error ── */
    #loading {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
    }
    #error-msg {
      display: none;
      margin: 24px;
      padding: 16px;
      background: rgba(248,81,73,.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      color: var(--red);
    }
  </style>
</head>
<body>

<header>
  <h1>🔭 Fueled OSS Metrics</h1>
  <span id="last-updated">Loading…</span>
</header>

<div id="error-msg"></div>
<div id="loading">Loading data…</div>

<div id="app" style="display:none">
  <div class="summary-bar">
    <div class="card">
      <div class="card-label">Repos Tracked</div>
      <div class="card-value" id="sum-repos">—</div>
    </div>
    <div class="card">
      <div class="card-label">Latest Month</div>
      <div class="card-value" id="sum-month">—</div>
    </div>
    <div class="card">
      <div class="card-label">Total Stars</div>
      <div class="card-value" id="sum-stars">—</div>
    </div>
    <div class="card">
      <div class="card-label">Total WP Installs</div>
      <div class="card-value" id="sum-installs">—</div>
    </div>
  </div>

  <div class="tabs-wrapper" id="tabs"></div>
  <div id="panels"></div>
</div>

<script>
'use strict';

// ── Colour palette ───────────────────────────────────────────
const COLORS = {
  stars:    '#58a6ff',
  forks:    '#3fb950',
  watchers: '#bc8cff',
  used_by:  '#ffa657',
  releases: '#d29922',
  installs: '#58a6ff',
  downloads:'#3fb950',
  rating:   '#ffa657',
};

const DATA_BASE = '../data/stats/';

// ── Helpers ──────────────────────────────────────────────────
const fmt = (n) => n == null ? '—' : Number(n).toLocaleString();

function deltaHtml(curr, prev) {
  if (curr == null || prev == null) return '<span class="null-val">—</span>';
  const d = curr - prev;
  if (d === 0) return '<span class="delta-zero">±0</span>';
  const cls = d > 0 ? 'delta-pos' : 'delta-neg';
  const sign = d > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${Number(d).toLocaleString()}</span>`;
}

function chartDefaults() {
  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#30363d';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  Chart.defaults.font.size = 12;
}

// ── Data loading ─────────────────────────────────────────────
async function loadAll() {
  const idxResp = await fetch(DATA_BASE + 'index.json');
  if (!idxResp.ok) throw new Error(`Failed to load index.json (${idxResp.status})`);
  const { files } = await idxResp.json();
  if (!files || files.length === 0) throw new Error('No data files found in index.json');

  const sorted = [...files].sort();
  const fetches = sorted.map(f => fetch(DATA_BASE + f).then(r => {
    if (!r.ok) throw new Error(`Failed to load ${f}`);
    return r.json();
  }));
  return Promise.all(fetches);
}

// ── Per-repo data transform ──────────────────────────────────
function buildRepoTimeseries(months, repoIdx) {
  return months.map(m => {
    const r = m.repos[repoIdx];
    return { period: m.period, repo: r };
  }).filter(x => x.repo);
}

// ── Chart builders ───────────────────────────────────────────
function makeLineChart(ctx, labels, datasets, scaleOverrides = {}) {
  return new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#21262d' } },
        y: { grid: { color: '#21262d' }, beginAtZero: false, ...scaleOverrides },
      },
    },
  });
}

function makeBarChart(ctx, labels, dataset) {
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [dataset] },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#21262d' } },
        y: { grid: { color: '#21262d' }, beginAtZero: true, ticks: { precision: 0 } },
      },
    },
  });
}

function ds(label, data, color, extra = {}) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: color + '33',
    borderWidth: 2,
    pointRadius: 4,
    pointHoverRadius: 6,
    tension: 0.3,
    fill: false,
    ...extra,
  };
}

// ── Build per-repo panel ─────────────────────────────────────
function buildPanel(container, repoKey, timeseries) {
  const labels = timeseries.map(t => t.period);

  const gh = k => timeseries.map(t => t.repo?.github_stats?.[k] ?? null);
  const wp = k => timeseries.map(t => t.repo?.wordpress_stats?.[k] ?? null);
  // WordPress.org API returns rating 0–100; convert to 0–5 star scale
  const wpRating = () => timeseries.map(t => {
    const r = t.repo?.wordpress_stats?.rating;
    return r != null ? Math.round(r / 20 * 10) / 10 : null;
  });

  const hasWp = timeseries.some(t => t.repo?.wordpress_stats != null);

  const id = suffix => `${suffix}-${repoKey}`;

  const wpBlock = hasWp ? `
    <div class="chart-box">
      <h3>WordPress — Active Installs</h3>
      <canvas id="${id('wp-installs')}"></canvas>
    </div>
    <div class="chart-box">
      <h3>WordPress — Total Downloads</h3>
      <canvas id="${id('wp-downloads')}"></canvas>
    </div>
    <div class="chart-box">
      <h3>WordPress — Rating (0–5)</h3>
      <canvas id="${id('wp-rating')}"></canvas>
    </div>` : '';

  container.innerHTML = `
    <div class="panel-grid">
      <div class="chart-box">
        <h3>GitHub — Stars</h3>
        <canvas id="${id('gh-stars')}"></canvas>
      </div>
      <div class="chart-box">
        <h3>GitHub — Forks</h3>
        <canvas id="${id('gh-forks')}"></canvas>
      </div>
      <div class="chart-box">
        <h3>GitHub — Used By (Repositories + Packages)</h3>
        <canvas id="${id('gh-usedby')}"></canvas>
      </div>
      <div class="chart-box">
        <h3>GitHub — Watchers</h3>
        <canvas id="${id('gh-watchers')}"></canvas>
      </div>
      <div class="chart-box">
        <h3>GitHub — Releases This Month</h3>
        <canvas id="${id('gh-releases')}"></canvas>
      </div>
      ${wpBlock}
      <div class="chart-box full-width table-wrapper">
        <h3>Monthly Data</h3>
        <div id="${id('table')}"></div>
      </div>
    </div>`;

  makeLineChart(document.getElementById(id('gh-stars')),    labels, [ds('Stars',    gh('stars'),    COLORS.stars)]);
  makeLineChart(document.getElementById(id('gh-forks')),    labels, [ds('Forks',    gh('forks'),    COLORS.forks)]);
  makeLineChart(document.getElementById(id('gh-usedby')),   labels, [ds('Used By',  gh('used_by_total'), COLORS.used_by)]);
  makeLineChart(document.getElementById(id('gh-watchers')), labels, [ds('Watchers', gh('watchers'), COLORS.watchers)]);

  makeBarChart(document.getElementById(id('gh-releases')), labels, {
    label: 'Releases',
    data: gh('releases_this_month'),
    backgroundColor: COLORS.releases + 'bb',
    borderColor: COLORS.releases,
    borderWidth: 1,
  });

  if (hasWp) {
    makeLineChart(document.getElementById(id('wp-installs')),  labels, [ds('Active Installs', wp('active_installs'), COLORS.installs)]);
    makeLineChart(document.getElementById(id('wp-downloads')), labels, [ds('Total Downloads',  wp('total_downloads'), COLORS.downloads)]);
    makeLineChart(document.getElementById(id('wp-rating')),    labels, [ds('Rating', wpRating(), COLORS.rating)],
      { min: 0, max: 5, ticks: { stepSize: 1 } });
  }

  // Data table
  buildTable(document.getElementById(id('table')), timeseries, hasWp, wpRating());
}

function buildTable(container, timeseries, hasWp, ratingData) {
  const rows = [...timeseries].reverse(); // newest first
  // ratingData is indexed in chronological order; reverse to match rows
  const ratingRows = ratingData ? [...ratingData].reverse() : [];

  const ghCols = [
    { key: 'stars',              label: 'Stars' },
    { key: 'forks',              label: 'Forks' },
    { key: 'watchers',           label: 'Watchers' },
    { key: 'used_by_total',      label: 'Used By' },
    { key: 'releases_this_month',label: 'Releases' },
  ];
  const wpCols = hasWp ? [
    { key: 'active_installs', label: 'Active Installs', src: 'wp' },
    { key: 'total_downloads', label: 'Total Downloads', src: 'wp' },
    { key: 'rating',          label: 'Rating (0–5)',    src: 'wp-rating' },
    { key: 'num_ratings',     label: '# Ratings',       src: 'wp' },
  ] : [];

  const allCols = [
    ...ghCols.map(c => ({...c, src: 'gh'})),
    ...wpCols,
  ];

  const headers = ['Month', ...allCols.flatMap(c => [c.label, 'Δ'])];

  const tbody = rows.map((row, i) => {
    const prev   = rows[i + 1];
    const ghNow  = row.repo?.github_stats   ?? {};
    const wpNow  = row.repo?.wordpress_stats ?? {};
    const ghPrev = prev?.repo?.github_stats   ?? {};
    const wpPrev = prev?.repo?.wordpress_stats ?? {};

    const cells = allCols.flatMap(col => {
      let now, prv;
      if (col.src === 'wp-rating') {
        now = ratingRows[i]     ?? null;
        prv = ratingRows[i + 1] ?? null;
      } else if (col.src === 'wp') {
        now = wpNow[col.key];
        prv = wpPrev?.[col.key];
      } else {
        now = ghNow[col.key];
        prv = ghPrev?.[col.key];
      }
      const displayNow = col.src === 'wp-rating' && now != null ? now.toFixed(1) : fmt(now);
      return [`<td>${displayNow}</td>`, `<td>${deltaHtml(now, prv)}</td>`];
    });

    return `<tr><td>${row.period}</td>${cells.join('')}</tr>`;
  });

  container.innerHTML = `
    <table>
      <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${tbody.join('')}</tbody>
    </table>`;
}

// ── Summary cards ────────────────────────────────────────────
function updateSummary(months) {
  const latest = months[months.length - 1];
  document.getElementById('sum-repos').textContent = latest.repos.length;
  document.getElementById('sum-month').textContent = latest.period;

  const totalStars = latest.repos.reduce((s, r) => s + (r.github_stats?.stars ?? 0), 0);
  document.getElementById('sum-stars').textContent = fmt(totalStars);

  const totalInstalls = latest.repos.reduce((s, r) => {
    const n = r.wordpress_stats?.active_installs;
    return n != null ? s + n : s;
  }, 0);
  document.getElementById('sum-installs').textContent =
    totalInstalls > 0 ? fmt(totalInstalls) : '—';

  const collected = latest.collected_at
    ? new Date(latest.collected_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    : latest.period;
  document.getElementById('last-updated').textContent = `Last updated: ${collected}`;
}

// ── Main ─────────────────────────────────────────────────────
async function main() {
  chartDefaults();

  try {
    const months = await loadAll();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    updateSummary(months);

    // Build tabs and panels from the repos in the latest month
    const latest = months[months.length - 1];
    const tabsEl  = document.getElementById('tabs');
    const panelsEl = document.getElementById('panels');

    latest.repos.forEach((repo, idx) => {
      const key = idx.toString();

      // Tab button
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
      btn.textContent = repo.label;
      btn.dataset.tab = key;
      tabsEl.appendChild(btn);

      // Panel div
      const panel = document.createElement('div');
      panel.className = 'repo-panel' + (idx === 0 ? ' active' : '');
      panel.id = `panel-${key}`;
      panelsEl.appendChild(panel);

      const timeseries = buildRepoTimeseries(months, idx);
      buildPanel(panel, key, timeseries);
    });

    // Tab switching
    tabsEl.addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.repo-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
    });

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    errEl.textContent = `Error loading data: ${err.message}`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
